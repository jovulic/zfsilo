message MountVolumeRequest {
  string id = 1 [
    (gnostic.openapi.v3.property) = {description: "The id of the volume to be mounted."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^vol_[a-zA-Z0-9-_]+$"
  ];
  string mount_path = 2 [
    (gnostic.openapi.v3.property) = {description: "The mount path."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^(/[^/ ]*)+/?$"
  ];
}

message MountVolumeResponse {
  Volume volume = 1;
}

message UnmountVolumeRequest {
  string id = 1 [
    (gnostic.openapi.v3.property) = {description: "The id of the volume to be unmounted."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^vol_[a-zA-Z0-9-_]+$"
  ];
  string mount_path = 2 [
    (gnostic.openapi.v3.property) = {description: "The mount path."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^(/[^/ ]*)+/?$"
  ];
}

message UnmountVolumeResponse {
  Volume volume = 1;
}

message StatsVolumeRequest {
  string id = 1 [
    (gnostic.openapi.v3.property) = {description: "The id of the volume."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^vol_[a-zA-Z0-9-_]+$"
  ];
}

message StatsVolumeResponse {
  message Stats {
    message Usage {
      enum Unit {
        UNIT_UNSPECIFIED = 0;
        UNIT_BYTES = 1;
        UNIT_INODES = 2;
      }

      Unit unit = 1;
      int64 total = 2;
      int64 used = 3;
      int64 available = 4;
    }

    repeated Usage usage = 1;
  }

  Stats stats = 1;
}

message SyncVolumeRequest {
  string id = 1 [
    (gnostic.openapi.v3.property) = {description: "The id of the volume to sync."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^vol_[a-zA-Z0-9-_]+$"
  ];
}

message SyncVolumeResponse {}

message SyncVolumesRequest {}

message SyncVolumesResponse {}
