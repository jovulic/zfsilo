syntax = "proto3";

package zfsilo.v1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// documentation: https://github.com/sudorandom/protoc-gen-connect-openapi/blob/main/gnostic.md
option (gnostic.openapi.v3.document) = {
  info: {
    title: "ZFSilo"
    version: "0.1.0"
    description: "A ZFS-based network storage layer over iSCSI."
    contact: {
      name: "Josip Vulic"
      url: "https://github.com/jovulic/zfsilo"
      email: "jovulic@gmail.com"
    }
    license: {
      name: "MIT License"
      url: "https://github.com/jovulic/zfsilo/blob/main/LICENSE"
    }
  }
  components: {
    security_schemes: {
      additional_properties: [
        {
          name: "BearerAuth"
          value: {
            security_scheme: {
              type: "http"
              scheme: "bearer"
            }
          }
        }
      ]
    }
  }
};

service Service {
  rpc GetCapacity(GetCapacityRequest) returns (GetCapacityResponse) {
    option (gnostic.openapi.v3.operation) = {
      summary: "Return the current free capacity in bytes."
      description: "GetCapacity returns a non‑negative available_capacity_bytes value indicating how many bytes are still available for allocation. "
    };
  }
}

message GetCapacityRequest {
  option (gnostic.openapi.v3.schema) = {description: "The get capacity request."};
}

message GetCapacityResponse {
  option (gnostic.openapi.v3.schema) = {description: "The get capacity response."};

  int64 available_capacity_bytes = 1 [(gnostic.openapi.v3.property) = {description: "The available capacity in bytes."}];
}

service HostService {
  rpc GetHost(GetHostRequest) returns (GetHostResponse) {}
  rpc ListHosts(ListHostsRequest) returns (ListHostsResponse) {}
  rpc CreateHost(CreateHostRequest) returns (CreateHostResponse) {}
  rpc UpdateHost(UpdateHostRequest) returns (UpdateHostResponse) {}
  rpc DeleteHost(DeleteHostRequest) returns (DeleteHostResponse) {}
}

message Host {
  option (buf.validate.message) = {
    cel: {
      id: "host.name_id_consistency"
      message: "The 'name' field must be in the format 'hosts/{id}'"
      expression: "this.name == 'hosts/' + this.id"
    }
  };
  option (gnostic.openapi.v3.schema) = {description: "The host resource."};

  message Connection {
    message Local {
      bool run_as_root = 1;
    }

    message Remote {
      string address = 1;
      int32 port = 2;
      string username = 3;
      string password = 4;
      bool run_as_root = 5;
    }

    oneof type {
      Local local = 1;
      Remote remote = 2;
    }
  }

  message Role {
    message Server {
      string endpoint = 1 [(gnostic.openapi.v3.property) = {description: "The data plane address or hostname for storage connections."}];
    }

    message Client {}

    oneof type {
      Server server = 1;
      Client client = 2;
    }
  }

  google.protobuf.Timestamp create_time = 1 [(gnostic.openapi.v3.property) = {
    description: "When the host was created."
    read_only: true
  }];
  google.protobuf.Timestamp update_time = 2 [(gnostic.openapi.v3.property) = {
    description: "When the host was last updated."
    read_only: true
  }];
  string id = 3 [
    (gnostic.openapi.v3.property) = {description: "The resource id. Immutable."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^hst_[a-zA-Z0-9-_]+$"
  ];
  string name = 4 [
    (gnostic.openapi.v3.property) = {description: "The resource name. Immutable."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^hosts/hst_[a-zA-Z0-9-_]+$"
  ];
  Connection connection = 5 [(gnostic.openapi.v3.property) = {description: "Connection details for the host."}];
  repeated string ids = 6 [(gnostic.openapi.v3.property) = {description: "List of IQN/NQN IDs"}];
  string key = 7 [(gnostic.openapi.v3.property) = {description: "Storage protocol key (used for deriving secrets)"}];
  Role role = 8 [(gnostic.openapi.v3.property) = {description: "The role of the host in the cluster."}];
  bool by_config = 10 [(gnostic.openapi.v3.property) = {
    description: "Whether the host is maintained by the configuration file."
    read_only: true
  }];
}

message GetHostRequest {
  string id = 1 [
    (gnostic.openapi.v3.property) = {description: "The host id."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^hst_[a-zA-Z0-9-_]+$"
  ];
}

message GetHostResponse {
  Host host = 1 [(gnostic.openapi.v3.property) = {description: "The host resource."}];
}

message ListHostsRequest {
  int32 page_size = 1 [
    (gnostic.openapi.v3.property) = {description: "The page size."},
    (buf.validate.field).int32.gte = 0
  ];
  string filter = 2 [(gnostic.openapi.v3.property) = {description: "The filter to apply over hosts."}];
  string order_by = 3 [(gnostic.openapi.v3.property) = {description: "The ordering to apply over hosts."}];
  string page_token = 4 [(gnostic.openapi.v3.property) = {description: "The page token. Used in subsequent requests to page over hosts."}];
}

message ListHostsResponse {
  repeated Host hosts = 1 [(gnostic.openapi.v3.property) = {description: "The list of hosts."}];
  string next_page_token = 2 [(gnostic.openapi.v3.property) = {description: "The page token for the next page of hosts."}];
}

message CreateHostRequest {
  Host host = 1 [
    (gnostic.openapi.v3.property) = {description: "The host resource."},
    (buf.validate.field).required = true
  ];
}

message CreateHostResponse {
  Host host = 1;
}

message UpdateHostRequest {
  google.protobuf.Struct host = 1 [
    (gnostic.openapi.v3.property) = {description: "The host to updated. Requires the host id to be specified and then include only the fields to be changed."},
    (buf.validate.field).required = true
  ];
}

message UpdateHostResponse {
  Host host = 1;
}

message DeleteHostRequest {
  string id = 1 [
    (gnostic.openapi.v3.property) = {description: "The host id."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^hst_[a-zA-Z0-9-_]+$"
  ];
}

message DeleteHostResponse {}

service VolumeService {
  rpc GetVolume(GetVolumeRequest) returns (GetVolumeResponse) {}
  rpc ListVolumes(ListVolumesRequest) returns (ListVolumesResponse) {}
  rpc CreateVolume(CreateVolumeRequest) returns (CreateVolumeResponse) {}
  rpc UpdateVolume(UpdateVolumeRequest) returns (UpdateVolumeResponse) {}
  rpc DeleteVolume(DeleteVolumeRequest) returns (DeleteVolumeResponse) {}
  rpc PublishVolume(PublishVolumeRequest) returns (PublishVolumeResponse) {}
  rpc UnpublishVolume(UnpublishVolumeRequest) returns (UnpublishVolumeResponse) {}
  rpc ConnectVolume(ConnectVolumeRequest) returns (ConnectVolumeResponse) {}
  rpc DisconnectVolume(DisconnectVolumeRequest) returns (DisconnectVolumeResponse) {}
  rpc StageVolume(StageVolumeRequest) returns (StageVolumeResponse) {}
  rpc UnstageVolume(UnstageVolumeRequest) returns (UnstageVolumeResponse) {}
  rpc MountVolume(MountVolumeRequest) returns (MountVolumeResponse) {}
  rpc UnmountVolume(UnmountVolumeRequest) returns (UnmountVolumeResponse) {}
  rpc StatsVolume(StatsVolumeRequest) returns (StatsVolumeResponse) {}
  rpc SyncVolume(SyncVolumeRequest) returns (SyncVolumeResponse) {}
  rpc SyncVolumes(SyncVolumesRequest) returns (SyncVolumesResponse) {}
}

message Volume {
  option (buf.validate.message) = {
    cel: {
      id: "volume.name_id_consistency"
      message: "The 'name' field must be in the format 'volumes/{id}'"
      expression: "this.name == 'volumes/' + this.id"
    }
  };
  option (gnostic.openapi.v3.schema) = {description: "The volume resource."};

  message Option {
    string key = 1;
    string value = 2;
  }

  enum Mode {
    MODE_UNSPECIFIED = 0;
    MODE_BLOCK = 1;
    MODE_FILESYSTEM = 2;
  }

  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_INITIAL = 1;
    STATUS_PUBLISHED = 2;
    STATUS_CONNECTED = 3;
    STATUS_STAGED = 4;
    STATUS_MOUNTED = 5;
  }

  enum Transport {
    TRANSPORT_UNSPECIFIED = 0;
    TRANSPORT_ISCSI = 1;
    TRANSPORT_NVMEOF_TCP = 2;
  }

  google.protobuf.Struct struct = 1 [(gnostic.openapi.v3.property) = {description: "Loosely structured data stored with the volume."}];
  google.protobuf.Timestamp create_time = 2 [(gnostic.openapi.v3.property) = {
    description: "When the volume was created."
    read_only: true
  }];
  google.protobuf.Timestamp update_time = 3 [(gnostic.openapi.v3.property) = {
    description: "When the volume was last updated."
    read_only: true
  }];
  string id = 4 [
    (gnostic.openapi.v3.property) = {description: "The resource id. Immutable."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^vol_[a-zA-Z0-9-_]+$"
  ];
  string name = 5 [
    (gnostic.openapi.v3.property) = {description: "The resource name. Immutable."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^volumes/vol_[a-zA-Z0-9-_]+$"
  ];
  string dataset_id = 6 [
    (gnostic.openapi.v3.property) = {description: "The ZFS dataset id. Immutable."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^[a-zA-Z0-9-_]+(/?[a-zA-Z0-9-_]+)*$"
  ];
  repeated Option options = 7 [(gnostic.openapi.v3.property) = {description: "The options applied to the volume. Immutable."}];
  optional bool sparse = 8 [(gnostic.openapi.v3.property) = {description: "Whether the volume is sparse. Immutable."}];
  Mode mode = 9 [
    (gnostic.openapi.v3.property) = {description: "The mode of the volume. Immutable."},
    (buf.validate.field).required = true
  ];
  int64 capacity_bytes = 10 [
    (gnostic.openapi.v3.property) = {description: "The capacity of the volume."},
    (buf.validate.field).int64.gte = 0
  ];
  Status status = 11 [(gnostic.openapi.v3.property) = {
    description: "The status of the volume."
    read_only: true
  }];
  optional Transport transport = 12 [(gnostic.openapi.v3.property) = {
    description: "The protocol used to expose this volume."
    read_only: true
  }];
  optional string server_host = 13 [
    (gnostic.openapi.v3.property) = {
      description: "The resource name of the host where the volume is published."
      read_only: true
    },
    (buf.validate.field).string.min_len = 1
  ];
  optional string client_host = 14 [
    (gnostic.openapi.v3.property) = {
      description: "The resource name of the host where the volume is connected."
      read_only: true
    },
    (buf.validate.field).string.min_len = 1
  ];
  optional string staging_path = 16 [
    (gnostic.openapi.v3.property) = {
      description: "The staging path on the client."
      read_only: true
    },
    (buf.validate.field).string = {pattern: "^(/[^/ ]*)+/?$"}
  ];
  repeated string target_paths = 17 [
    (gnostic.openapi.v3.property) = {
      description: "The target paths on the client where the volume is mounted."
      read_only: true
    },
    (buf.validate.field).repeated.items.string = {pattern: "^(/[^/ ]*)+/?$"}
  ];
}

message GetVolumeRequest {
  string id = 1 [
    (gnostic.openapi.v3.property) = {description: "The volume id."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^vol_[a-zA-Z0-9-_]+$"
  ];
}

message GetVolumeResponse {
  Volume volume = 1 [(gnostic.openapi.v3.property) = {description: "The volume resource."}];
}

message ListVolumesRequest {
  int32 page_size = 1 [
    (gnostic.openapi.v3.property) = {description: "The page size."},
    (buf.validate.field).int32.gte = 0
  ];
  string filter = 2 [(gnostic.openapi.v3.property) = {description: "The filter to apply over volumes."}];
  string order_by = 3 [(gnostic.openapi.v3.property) = {description: "The ordering to apply over volumes."}];
  string page_token = 4 [(gnostic.openapi.v3.property) = {description: "The page token. Used in subsequent requests to page over volumes."}];
}

message ListVolumesResponse {
  repeated Volume volumes = 1 [(gnostic.openapi.v3.property) = {description: "The list of volumes."}];
  string next_page_token = 2 [(gnostic.openapi.v3.property) = {description: "The page token for the next page of volumes."}];
}

message CreateVolumeRequest {
  Volume volume = 1 [
    (gnostic.openapi.v3.property) = {description: "The volume resource."},
    (buf.validate.field).required = true
  ];
}

message CreateVolumeResponse {
  Volume volume = 1;
}

message UpdateVolumeRequest {
  google.protobuf.Struct volume = 1 [
    (gnostic.openapi.v3.property) = {description: "The volume to updated. Requires the volume id to be specified and then include only the fields to be changed."},
    (buf.validate.field).required = true
  ];
}

message UpdateVolumeResponse {
  Volume volume = 1;
}

message DeleteVolumeRequest {
  string id = 1 [
    (gnostic.openapi.v3.property) = {description: "The volume id."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^vol_[a-zA-Z0-9-_]+$"
  ];
}

message DeleteVolumeResponse {}

message PublishVolumeRequest {
  string id = 1 [
    (gnostic.openapi.v3.property) = {description: "The id of the volume to be published."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^vol_[a-zA-Z0-9-_]+$"
  ];
  Volume.Transport transport = 2 [(gnostic.openapi.v3.property) = {description: "The protocol used to expose this volume."}];
  string server_host = 3 [(gnostic.openapi.v3.property) = {description: "The resource name of the host where the volume will be published."}];
}

message PublishVolumeResponse {
  Volume volume = 1;
}

message UnpublishVolumeRequest {
  string id = 1 [
    (gnostic.openapi.v3.property) = {description: "The id of the volume to be unpublished."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^vol_[a-zA-Z0-9-_]+$"
  ];
}

message UnpublishVolumeResponse {
  Volume volume = 1;
}

message ConnectVolumeRequest {
  string id = 1 [
    (gnostic.openapi.v3.property) = {description: "The id of the volume to be connected."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^vol_[a-zA-Z0-9-_]+$"
  ];
  string client_host = 2 [
    (gnostic.openapi.v3.property) = {description: "The resource name of the host to connect the volume to."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];
}

message ConnectVolumeResponse {
  Volume volume = 1;
}

message DisconnectVolumeRequest {
  string id = 1 [
    (gnostic.openapi.v3.property) = {description: "The id of the volume to be disconnected."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^vol_[a-zA-Z0-9-_]+$"
  ];
}

message DisconnectVolumeResponse {
  Volume volume = 1;
}

message StageVolumeRequest {
  string id = 1 [
    (gnostic.openapi.v3.property) = {description: "The id of the volume to be staged."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^vol_[a-zA-Z0-9-_]+$"
  ];
  string staging_path = 2 [
    (gnostic.openapi.v3.property) = {description: "The staging path."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^(/[^/ ]*)+/?$"
  ];
}

message StageVolumeResponse {
  Volume volume = 1;
}

message UnstageVolumeRequest {
  string id = 1 [
    (gnostic.openapi.v3.property) = {description: "The id of the volume to be unstaged."},
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^vol_[a-zA-Z0-9-_]+$"
  ];
}

message UnstageVolumeResponse {
  Volume volume = 1;
